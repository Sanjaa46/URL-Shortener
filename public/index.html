<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./index.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <form id="url-form">
            <input type="text" id="long-url" name="url" placeholder="Enter URL (e.g., https://example.com)" required>
            <div id="buttons">
                <button type="submit">Shorten</button>
                <button type="button" id="qr-button">Generate QR Code</button>
            </div>
        </form>
        <div id="result">
        </div>
    </div>
</body>
</html>
